
# general settings for image SR training
name: train_WaveHMT_SR_x2
model_type: MambaIRv2Model
scale: 2
num_gpu: 1
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: AID
    type: PairedImageDataset
    dataroot_gt:
      "/dataset/AID/train/train_HR"
    dataroot_lq:
      "/dataset/AID/train/train_x2"
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

    gt_size: 128  #192
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 10
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val:
    name: AID30
    type: PairedImageDataset
    dataroot_gt: "/dataset/AID/val/val_HR"
    dataroot_lq: "/dataset/AID/val/val_x2"
    filename_tmpl: '{}x2'
    io_backend:
      type: disk


# network structures
network_g:
  type: WaveHMT
  upscale: 2
  in_chans: 3
  img_size: 64
  img_range: 1.
  embed_dim: 180
  d_state: 16
  depths: [ 4, 4, 4, 4, 4, 4 ]
  num_heads: [ 6, 6, 6, 6, 6, 6 ]
  window_size: 16
  inner_rank: 64
  num_tokens: 128
  convffn_kernel_size: 5
  mlp_ratio: 2.
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'


# path
path:
  # for classic SRx4, we use the x2 Model to initialize and halve the training iteration and lr for fast training
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~


# training settings
train:
  optim_g:
    type: Adam
    # lr: !!float 2e-4
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [ 250000, 400000, 450000, 475000 ]
    #milestones: [ 125000, 200000, 225000, 237500 ]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
# validation settings
val:
  val_freq: !!float 5e3
  save_img: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true


# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500